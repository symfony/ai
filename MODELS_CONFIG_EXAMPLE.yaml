# Example AI Bundle Configuration with Models

ai:
  platform:
    openai:
      api_key: '%env(OPENAI_API_KEY)%'
    anthropic:
      api_key: '%env(ANTHROPIC_API_KEY)%'
  
  models:
    openai:
      gpt-4o-mini:
        class: 'Symfony\AI\Platform\Bridge\OpenAi\Gpt'
        capabilities:
          - 'input-messages'
          - 'input-image'
          - 'output-text'
          - 'output-streaming'
          - 'output-structured'
          - 'tool-calling'
      
      gpt-4o:
        class: 'Symfony\AI\Platform\Bridge\OpenAi\Gpt'
        capabilities:
          - 'input-messages'
          - 'input-image'
          - 'output-text'
          - 'output-streaming'
          - 'output-structured'
          - 'tool-calling'
      
      gpt-4:
        class: 'Symfony\AI\Platform\Bridge\OpenAi\Gpt'
        capabilities:
          - 'input-messages'
          - 'output-text'
          - 'output-streaming'
          - 'tool-calling'
    
    anthropic:
      claude-3-5-sonnet:
        class: 'Symfony\AI\Platform\Bridge\Anthropic\Claude'
        capabilities:
          - 'input-messages'
          - 'input-image'
          - 'output-text'
          - 'output-streaming'
          - 'tool-calling'

  agent:
    my_agent:
      platform: 'ai.platform.openai'
      model:
        class: 'Symfony\AI\Platform\Bridge\OpenAi\Gpt'
        name: 'gpt-4o-mini'