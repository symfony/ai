services:
    pinecone:
        image: ghcr.io/pinecone-io/pinecone-local:latest
        platform: linux/amd64
        environment:
            PORT: 5080
            PINECONE_HOST: localhost
        ports:
            # The control plane listens on 5080, every created index is exposed on its own port of the range
            - '5080-5090:5080-5090'
