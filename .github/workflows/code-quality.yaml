name: Code Quality

on:
    pull_request:
        paths-ignore:
            - 'src/*/doc/**'
            - 'src/**/*.md'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

env:
    PHP_VERSION: '8.5'
    REQUIRED_PHP_EXTENSIONS: 'mongodb, redis'

jobs:
    # ===========================================
    # PHPStan
    # ===========================================
    #
    # PHPStan only needs an autoloader, so every package is analysed against a single workspace
    # install instead of one composer install per package. Failures are reported per package by
    # .github/run-in-packages.sh and annotated inline via PHPStan's github error format.
    phpstan:
        name: PHPStan / ${{ matrix.shard.name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shard:
                    -   name: Components & Bundles
                        path: 'src'
                    -   name: Platform Bridges
                        path: 'src/platform/src/Bridge'
                    -   name: Store Bridges
                        path: 'src/store/src/Bridge'
                    -   name: Tool Bridges
                        path: 'src/agent/src/Bridge'
                    -   name: Message Store Bridges
                        path: 'src/chat/src/Bridge'
                    -   name: Mate Bridges
                        path: 'src/mate/src/Bridge'
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install workspace
              uses: ./.github/actions/workspace
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}

            - name: Run PHPStan
              run: |
                  # -maxdepth 3 keeps the "src" shard to components and bundles; bridges live deeper
                  # and are covered by their own shards.
                  find ${{ matrix.shard.path }} -maxdepth 3 -name phpstan.dist.neon -not -path '*/vendor/*' | sort \
                      | .github/run-in-packages.sh vendor/bin/phpstan analyse --no-progress --error-format=github -c '{}'

    phpstan-demo:
        name: PHPStan / Demo
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build root packages
              run: php .github/build-packages.php

            - name: Install dependencies
              uses: ramsey/composer-install@v4
              with:
                  working-directory: demo
                  composer-options: "--no-scripts"

            - name: Link packages
              run: cd demo && ../link

            - name: Clear the cache
              run: cd demo && php bin/console cache:clear

            - name: Run PHPStan
              run: cd demo && vendor/bin/phpstan

    phpstan-examples:
        name: PHPStan / Examples
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build root packages
              run: php .github/build-packages.php

            - name: Install dependencies
              uses: ramsey/composer-install@v4
              with:
                  working-directory: examples

            - name: Link packages
              run: cd examples && ../link

            - name: Run PHPStan
              run: cd examples && vendor/bin/phpstan
