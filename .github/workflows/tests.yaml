name: Tests

on:
    pull_request:
        paths-ignore:
            - 'src/*/doc/**'
            - 'src/**/*.md'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

env:
    REQUIRED_PHP_EXTENSIONS: 'mongodb, redis'

jobs:
    # ===========================================
    # Build Matrix
    # ===========================================
    matrix:
        name: Matrix
        uses: ./.github/workflows/build-matrix.yaml

    # ===========================================
    # Unit Tests
    # ===========================================
    #
    # Every package is tested against a single workspace install. Composer resolves the
    # intersection of all package constraints, which for the highest and for a pinned Symfony
    # version is the same result a per-package install would produce.
    #
    # This does NOT hold for --prefer-lowest: a merged install resolves to the highest of all
    # per-package floors (e.g. Mate allows symfony/console ^5.4 while Platform requires ^7.3),
    # so the lowest matrix below keeps installing each package on its own.
    unit:
        name: Unit / PHP ${{ matrix.php-version }}${{ matrix.symfony-version && format(' / Symfony {0}', matrix.symfony-version) || '' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    -   php-version: '8.2'
                    -   php-version: '8.5'
                    # LTS version of Symfony
                    -   php-version: '8.2'
                        symfony-version: '7.4.*'
                    -   php-version: '8.5'
                        symfony-version: '8.0.*'

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Configure environment
              run: echo COLUMNS=120 >> $GITHUB_ENV

            - name: Install workspace
              uses: ./.github/actions/workspace
              with:
                  php-version: ${{ matrix.php-version }}
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}
                  symfony-version: ${{ matrix.symfony-version }}

            # The Sqlite bridge tests only load the extension on PHP >= 8.4 and fall back to plain
            # PDO otherwise, so installing it on 8.2 would have no effect.
            - name: Install sqlite-vec extension
              if: matrix.php-version == '8.5'
              run: |
                  # Without --fail curl exits 0 on an HTTP error and pipes the error page into sh, and
                  # without pipefail only sh's status is checked. The extension would then be missing
                  # while the step still passes, and the Sqlite tests would silently fall back to PDO.
                  set -o pipefail
                  curl -fsSL https://github.com/asg017/sqlite-vec/releases/download/v0.1.9/install.sh | sh
                  test -f "$(pwd)/vec0.so"
                  echo "SQLITE_VEC_PATH=$(pwd)/vec0.so" >> $GITHUB_ENV

            - name: Run PHPUnit
              run: |
                  find src -name phpunit.xml.dist -not -path '*/vendor/*' | sort \
                      | .github/run-in-packages.sh vendor/bin/phpunit -c '{}' --exclude-group integration

    # Mate is the only package supporting Symfony 5.4 and 6.4, so it cannot share the workspace.
    unit-mate-legacy-symfony:
        name: Unit / Component / Mate / PHP 8.2 / Symfony ${{ matrix.symfony-version }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                symfony-version: ['5.4.*', '6.4.*']

        env:
            SYMFONY_REQUIRE: ${{ matrix.symfony-version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Configure environment
              run: echo COLUMNS=120 >> $GITHUB_ENV

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: flex
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}

            # deptrac does not support Symfony 5.4
            - name: Remove deptrac for unsupported Symfony versions
              if: startsWith(matrix.symfony-version, '5.4')
              run: composer remove --dev deptrac/deptrac --no-update

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build packages
              run: php .github/build-packages.php

            - name: Clean vendor folder
              run: rm -rf vendor

            - name: Install dependencies
              uses: ramsey/composer-install@v4
              with:
                  working-directory: src/mate

            - name: Run PHPUnit
              run: cd src/mate && vendor/bin/phpunit

    # ===========================================
    # Unit Tests / lowest dependencies
    # ===========================================
    #
    # --prefer-lowest cannot share a workspace install: composer would resolve the intersection of
    # all constraints and pick the highest of every package's floor, never exercising the lowest
    # bound a single package declares. So each package is installed on its own -- but grouped a few
    # per job and run in parallel by .github/run-lowest.sh, instead of one job per package.
    lowest:
        name: Unit / Lowest / ${{ matrix.shard.name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shard:
                    -   name: Components
                        find: "find src -name phpunit.xml.dist -not -path '*/Bridge/*' -not -path '*/vendor/*'"
                    -   name: Platform Bridges
                        find: "find src/platform/src/Bridge -mindepth 2 -maxdepth 2 -name phpunit.xml.dist"
                    -   name: Store Bridges
                        find: "find src/store/src/Bridge -mindepth 2 -maxdepth 2 -name phpunit.xml.dist"
                    -   name: Tool Bridges
                        find: "find src/agent/src/Bridge -mindepth 2 -maxdepth 2 -name phpunit.xml.dist"
                    -   name: Message Store Bridges
                        find: "find src/chat/src/Bridge -mindepth 2 -maxdepth 2 -name phpunit.xml.dist"
                    -   name: Mate Bridges
                        find: "find src/mate/src/Bridge -mindepth 2 -maxdepth 2 -name phpunit.xml.dist"

        env:
            SYMFONY_REQUIRE: '>=7.4'
            SYMFONY_DEPRECATIONS_HELPER: weak

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Configure environment
              run: echo COLUMNS=120 >> $GITHUB_ENV

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: flex
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build packages
              run: php .github/build-packages.php

            - name: Run lowest install + tests
              run: ${{ matrix.shard.find }} -printf '%h\n' | sort | .github/run-lowest.sh

    # ===========================================
    # Integration Tests
    # ===========================================
    store-bridges-integration:
        name: Integration / Store / ${{ matrix.bridge }}
        needs: matrix
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                bridge: ${{ fromJson(needs.matrix.outputs.store-bridges-integration) }}

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  tools: flex
                  extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build packages
              run: php .github/build-packages.php

            - name: Isolate Bridge
              uses: ./.github/actions/isolate-bridge
              with:
                  component: store
                  bridge: ${{ matrix.bridge }}
                  target: tmp

            - name: Install dependencies
              uses: ramsey/composer-install@v4
              with:
                  working-directory: tmp/store/src/Bridge/${{ matrix.bridge }}

            - name: Start Docker services
              working-directory: tmp/store/src/Bridge/${{ matrix.bridge }}
              run: docker compose up -d --wait || true

            - name: Wait for services to be ready
              run: sleep 15

            - name: Run integration tests
              run: cd tmp/store/src/Bridge/${{ matrix.bridge }} && vendor/bin/phpunit --group integration

            - name: Stop Docker services
              working-directory: tmp/store/src/Bridge/${{ matrix.bridge }}
              run: docker compose down || true

    demo:
        name: Integration / Demo
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  tools: flex
                  extensions: "${{ env.REQUIRED_PHP_EXTENSIONS }}"

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build root packages
              run: php .github/build-packages.php

            - name: Install demo dependencies
              uses: ramsey/composer-install@v4
              with:
                  composer-options: "--no-scripts"
                  working-directory: demo

            - name: Link local packages
              working-directory: demo
              run: ../link

            - run: composer run-script auto-scripts --no-interaction
              working-directory: demo

            - run: bin/console lint:container
              working-directory: demo

            - name: Run demo tests
              working-directory: demo
              run: vendor/bin/phpunit

    demo-no-dev:
        name: Integration / Demo (no-dev)
        needs: demo
        runs-on: ubuntu-latest
        env:
            APP_ENV: prod

        steps:
            - uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  tools: flex
                  extensions: "${{ env.REQUIRED_PHP_EXTENSIONS }}"

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build root packages
              run: php .github/build-packages.php

            - name: Install demo dependencies (no-dev)
              uses: ramsey/composer-install@v4
              with:
                  composer-options: "--no-scripts --no-dev"
                  working-directory: demo

            - name: Link local packages
              working-directory: demo
              run: ../link

            - run: composer run-script auto-scripts --no-interaction
              working-directory: demo

            - run: bin/console lint:container
              working-directory: demo

            - run: bin/console cache:clear
              working-directory: demo

    examples:
        name: Integration / Examples / PHP ${{ matrix.php-version }}${{ matrix.dependency-version == 'lowest' && ' / lowest' || '' }}${{ matrix.symfony-version && format(' / Symfony {0}', matrix.symfony-version) || '' }}
        needs: demo
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: ['8.2', '8.5']
                dependency-version: ['']
                symfony-version: ['']
                include:
                    # lowest deps
                    -   php-version: '8.2'
                        dependency-version: 'lowest'
                    # LTS version of Symfony
                    -   php-version: '8.2'
                        symfony-version: '7.4.*'

        env:
            SYMFONY_REQUIRE: ${{ matrix.symfony-version || '>=7.4' }}

        steps:
            - uses: actions/checkout@v7

            - name: Up the examples services
              working-directory: examples
              run: docker compose up -d meilisearch mongodb pogocache redis surrealdb

            - name: Configure environment
              run: |
                  echo COLUMNS=120 >> $GITHUB_ENV
                  [ 'lowest' = '${{ matrix.dependency-version }}' ] && echo SYMFONY_DEPRECATIONS_HELPER=weak >> $GITHUB_ENV || true

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  tools: flex
                  extensions: "${{ env.REQUIRED_PHP_EXTENSIONS }}"

            - name: Install root dependencies
              uses: ramsey/composer-install@v4

            - name: Build root packages
              run: php .github/build-packages.php

            - name: Install examples dependencies
              uses: ramsey/composer-install@v4
              with:
                  working-directory: examples

            - name: Link local components to examples
              run: ./link examples

            - name: Run command example
              working-directory: examples
              run: php commands/message-stores.php
